<!DOCTYPE html>
<html>

<body>
   <button id="file-selector-button" onclick="selectFile()">Select GCode file</button>
   <label id="selected-file-name">...</label>
   <input type="file" id="file-selector" style="visibility: hidden;" />

   <form action="/action_page.php">
      <label for="extended-memory-selector">Select extended memory address:</label>
      <select id="extended-memory-selector"></select>
   </form>

   <form action="/action_page.php">
      <label for="words-per-line">Select number of word per line:</label>
      <input type="number" id="words-per-line" name="quantity" min="32" max="256" value="80">
   </form>

   <button onclick="generate()">Generate</button>
   <button onclick="download()">Download</button>

   <p id="result">Result:</p>

   <script>
      function selectFile() {
         document.getElementById('file-selector').click();
      }

      let gcodeStr = '';
      var selectedFileName = '';
      if (window.FileList && window.File && window.FileReader) {
         document.getElementById('file-selector').addEventListener('change', event => {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.addEventListener('load', event => {
               gcodeStr = event.target.result;
               selectedFileName = file.name;
               document.getElementById('selected-file-name').textContent = selectedFileName;
            });
            reader.readAsText(file);
         });
      }

      function fillExtendedMemoryList() {
         var select = document.getElementById('extended-memory-selector');

         for (var i = 0; i < 10; i++) {
            var elm = document.createElement('option');
            elm.textContent = 'EM' + i;
            elm.value = 'em' + i;
            select.appendChild(elm);
         }
      }
      fillExtendedMemoryList();

      function formatLine(line, wordsPerLine) {
         line = line.trim().replace(/[^()](?=([^()]*\([^()]*\))*[^()]*$)/g, t => t.toUpperCase());
         if (line.length > wordsPerLine) {
            line = line.substring(0, wordsPerLine);
         } else {
            line = line.concat('\x20'.repeat(wordsPerLine - line.length));
         }
         return line;
      }

      var resultStr = '';
      function generate() {
         resultStr = '';
         let gcodeLines = gcodeStr.match(/[^\r\n]+/g);
         gcodeLines.unshift(`${gcodeLines.length} LINES FROM (${selectedFileName})`);
         var wordsPerLine = document.getElementById('words-per-line').value;
         for (i = 0; i < gcodeLines.length; i++) {
            resultStr += formatLine(gcodeLines[i], wordsPerLine);
         }
         let result = document.getElementById('result');
         result.innerHTML = resultStr;
      }

      function download() {
         var filename = document.getElementById('extended-memory-selector').value + '.emi';
         var text = resultStr;

         var pom = document.createElement('a');
         pom.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
         pom.setAttribute('download', filename);

         if (document.createEvent) {
            var event = document.createEvent('MouseEvents');
            event.initEvent('click', true, true);
            pom.dispatchEvent(event);
         } else {
            pom.click();
         }
      }
   </script>

</body>

</html>
