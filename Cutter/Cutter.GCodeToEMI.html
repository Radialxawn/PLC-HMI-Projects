<!DOCTYPE html>
<html>

<body>
   <button id="file-selector-button" onclick="selectFile()">Select GCode file</button>
   <label id="selected-file-name">...</label>
   <input type="file" id="file-selector" style="visibility: hidden;" />

   <form action="/action_page.php">
      <label for="extended-memory-selector">Select extended memory address:</label>
      <select id="extended-memory-selector"></select>
   </form>

   <form action="/action_page.php">
      <label for="words-per-line">Select number of word per line:</label>
      <input type="number" id="words-per-line" name="quantity" min="32" max="256" value="80">
   </form>

   <form action="/action_page.php">
      <label for="pulse-per-millimeter">Select pulse per millimeter:</label>
      <input type="number" id="pulse-per-millimeter" name="quantity" min="100" max="500" value="100">
   </form>

   <form action="/action_page.php">
      <label for="max-feed-speed">Select max feed speed:</label>
      <input type="number" id="max-feed-speed" name="quantity" min="100" max="2000" value="1000">
      <label type="text">mm/s</label>
   </form>

   <button onclick="generate()">Generate</button>
   <button onclick="download()">Download</button>

   <p id="result">Result:</p>

   <script>
      let wordsPerLineField = document.getElementById('words-per-line');
      let maxFeedSpeedField = document.getElementById('max-feed-speed');
      let pulsePerMillimeterField = document.getElementById('pulse-per-millimeter');

      function selectFile() {
         document.getElementById('file-selector').click();
      }

      let gcodeLines = {};
      var selectedFileName = '';
      if (window.FileList && window.File && window.FileReader) {
         document.getElementById('file-selector').addEventListener('change', event => {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.addEventListener('load', event => {
               gcodeLines = event.target.result.match(/[^\r\n]+/g);
               selectedFileName = file.name;
               document.getElementById('selected-file-name').textContent = selectedFileName;
            });
            reader.readAsText(file);
         });
      }

      function fillExtendedMemoryList() {
         var select = document.getElementById('extended-memory-selector');

         for (var i = 0; i < 10; i++) {
            var elm = document.createElement('option');
            elm.textContent = 'EM' + i;
            elm.value = 'em' + i;
            select.appendChild(elm);
         }
      }
      fillExtendedMemoryList();

      function intToWord(value) {
         var hex = '';
         var word = '';
         value += value < 0 ? 0xFFFF + 1 : 0;
         hex = ('0000' + value.toString(16)).slice(-4);
         word += String.fromCharCode(parseInt(hex.substring(2, 4), 16));
         word += String.fromCharCode(parseInt(hex.substring(0, 2), 16));
         return word;
      }

      function intToDWord(value) {
         var hex = '';
         var word = '';
         value += value < 0 ? 0xFFFFFFFF + 1 : 0;
         hex = ('00000000' + value.toString(16)).slice(-8);
         word += String.fromCharCode(parseInt(hex.substring(6, 8), 16));
         word += String.fromCharCode(parseInt(hex.substring(4, 6), 16));
         word += String.fromCharCode(parseInt(hex.substring(2, 4), 16));
         word += String.fromCharCode(parseInt(hex.substring(0, 2), 16));
         return word;
      }

      const inchToMillimeter = 25.4;
      var unitMultiplier = 1, isRelativeMode = true;
      var preTargetX = 0, preTargetY = 0, preFeedSpeedX = 0, preFeedSpeedY = 0, preFeedSpeed = 0;
      var targetX = 0, targetY = 0, feedSpeedX = 0, feedSpeedY = 0, feedSpeed = 0, AcDcTime = 0;
      var commandLtArray = '', commandNbArray = '', targetXArray = '', targetYArray = '', feedSpeedXArray = '', feedSpeedYArray = '', AcDcTimeArray = '';
      function readGCodeLines() {
         var test = '';
         for (i = 1; i < gcodeLines.length; i++) {
            var line = gcodeLines[i];
            var parts = line.match(/[A-Za-z][+-]?([0-9]*[.])?[0-9]+/g);

            for (j = 0; j < parts.length; j++) {
               var part = parts[j];
               var letter = part[0].toUpperCase();
               var number = parseFloat(part.substring(1, part.length));

               var isCommand = false;
               switch (letter) {
                  case 'G':
                     switch (number) {
                        case 0:  // rapid motion
                           feedSpeed = maxFeedSpeedField.value;
                           break;
                        case 1:  // controlled motion
                           feedSpeed = preFeedSpeed;
                           break;
                        case 20: // inch
                           unitMultiplier = inchToMillimeter;
                           break;
                        case 21: // millimeter
                           unitMultiplier = 1;
                           break;
                        case 28: // homing
                           targetX = targetY = 0;
                           break;
                        case 90: // absolute mode
                           isRelativeMode = false;
                           break;
                        case 91: // relative mode
                           isRelativeMode = true;
                           break;
                     }
                     isCommand = true;
                     break;
                  case 'X':
                     targetX = number * unitMultiplier + (isRelativeMode ? preTargetX : 0);
                     break;
                  case 'Y':
                     targetY = number * unitMultiplier + (isRelativeMode ? preTargetY : 0);
                     break;
                  case 'M':   // 2: end program, 3: spindle on, 5: spindle off, 30: end program
                     isCommand = true;
                     break;
                  case 'F':
                     feedSpeed = number * unitMultiplier;
                     preFeedSpeed = feedSpeed;
                     break;
               }

               if (j == 0) {
                  if (isCommand) {
                     commandLtArray += letter.charCodeAt(0);
                     commandNbArray += intToWord(number);
                  } else {
                     commandLtArray += '\x20'.repeat(2);
                  }
               }
            }
            //||||||||||||||||||||||||||||||||||||||\\
            var deltaX = targetX - preTargetX;
            var deltaY = targetY - preTargetY;
            var deltaD = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            deltaD = deltaD == 0 ? 1 : deltaD;

            feedSpeedX = Math.abs(feedSpeed * deltaX / deltaD);
            feedSpeedY = Math.abs(feedSpeed * deltaY / deltaD);

            var biggerFeedSpeed = Math.max(feedSpeedX, feedSpeedY);
            AcDcTime = biggerFeedSpeed * 0.1;
            //||||||||||||||||||||||||||||||||||||||\\
            var TX = Math.round(targetX * pulsePerMillimeterField.value);
            var TY = Math.round(targetY * pulsePerMillimeterField.value);
            var FSX = Math.round(feedSpeedX * pulsePerMillimeterField.value);
            var FSY = Math.round(feedSpeedY * pulsePerMillimeterField.value);
            var ADT = Math.round(AcDcTime);

            test += `TX=${TX}, TY=${TY}, FSX=${FSX}, FSY=${FSY}, ADT=${ADT}---------------------------`;

            preTargetX = targetX;
            preTargetY = targetY;
            feedSpeed = preFeedSpeed;
         }
         return test;
      }

      function formatLine(line, wordsPerLine) {
         line = line.trim().replace(/\s+/g, ' ');
         line = line.replace(/[^()](?=([^()]*\([^()]*\))*[^()]*$)/g, t => t.toUpperCase());
         if (line.length > wordsPerLine) {
            line = line.substring(0, wordsPerLine);
         } else {
            line = line.concat('\x20'.repeat(wordsPerLine - line.length));
         }
         return line;
      }

      var resultStr = '';
      function generate() {
         resultStr = '';

         var lineCount = '0'.repeat(6).concat(gcodeLines.length).slice(-6);
         var lineZero = formatLine(`${lineCount}/${lineCount} LINES FROM (${selectedFileName})`, wordsPerLineField.value);
         gcodeLines.unshift(lineZero);

         for (i = 0; i < gcodeLines.length; i++) {
            resultStr += formatLine(gcodeLines[i], wordsPerLineField.value);
         }

         resultStr += readGCodeLines();

         let result = document.getElementById('result');
         result.innerHTML = resultStr;
      }

      function download() {
         var filename = document.getElementById('extended-memory-selector').value + '.emi';
         var text = resultStr;

         var pom = document.createElement('a');
         pom.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
         pom.setAttribute('download', filename);

         if (document.createEvent) {
            var event = document.createEvent('MouseEvents');
            event.initEvent('click', true, true);
            pom.dispatchEvent(event);
         } else {
            pom.click();
         }
      }
   </script>

</body>

</html>
