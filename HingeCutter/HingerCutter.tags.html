<!DOCTYPE html>
<html>

<body>
	<p id="error" style="white-space: pre;color: crimson;"></p>
	<button onclick="copy(PLCTagsString)">Copy</button>
	<p id="plc-tags" style="white-space: pre;"></p>
	<button onclick="copy(HMITagsString)">Copy</button>
	<p id="hmi-tags" style="white-space: pre;"></p>

	<script>
		function setById(id, value) { document.getElementById(id).innerHTML = value; }
		function getById(id) { return document.getElementById(id); }

		let HMITags = {};
		let HMITagsString = '';
		let PLCTags = {};
		let PLCTagsString = '';
		let errorString = '';
		const PLC1 = 'PLC1', M = 'M', D = 'D', Self = 'Self', LB = 'LB', LW = 'LW';
		const BOOL = 'BOOL', INT = 'INT', DINT = 'DINT', X = 'X', Y = 'Y';
		const XAxis = 'XX', YAxis = 'YY';

		function generate() {
			generatePLCTags();
			setById('plc-tags', PLCTagsString);
			generateHMITags();
			setById('hmi-tags', HMITagsString);
			setById('error', errorString);
		}

		function generatePLCTags() {
			PLCTagsString += `"HingeCutter"\n`;
			PLCTagsString += `"Class"	"Label Name"	"Data Type"	"Constant"	"Device"	"Address"	"Comment"	"Remark"	"Relation with System Label"	"System Label Name"	"Attribute"\n`;
			newPLCTag('IsOn', BOOL, M, 0, true);
			newPLCTag('RunButton', BOOL, M, 1, true);
			newPLCTag('RunButtonRisingLatch', BOOL);
			newPLCTag('RunButtonFallingLatch', BOOL);
			newPLCTag('StopButton', BOOL, M, 2, true);
			newPLCTag('ResetButton', BOOL, M, 3, true);
			newPLCTag('SetButton', BOOL, M, 4, true);
			newPLCTag('OriginButton', BOOL, M, 5, true);
			newPLCTag('FeedSpeed', DINT, D, 0, true);

			newPLCTag('OnOffResetStop', 'OnOffResetStop');
			newPLCTag('PositionUpdater', 'PositionUpdater');
			newPLCTag('ManualHandler', 'ManualHandler');
			newPLCTag('AutoHandler', 'AutoHandler');
			newPLCTag('CommandHandler', 'CommandHandler');
			newPLCTag('PulseOutAndLimit', 'PulseOutAndLimit');
			newPLCTag('OriginSetMove', 'OriginSetMove');

			newPLCTag('FoilBlocker', BOOL, M, 14);
			newPLCTag('FoilClamper', BOOL, M, 15);
			newPLCTag('Cutter1A', BOOL, M, 16);
			newPLCTag('Cutter1B', BOOL, M, 17);
			newPLCTag('Cutter2A', BOOL, M, 20);
			newPLCTag('Cutter2B', BOOL, M, 21);
			newPLCTag('Cutter3A', BOOL, M, 22);
			newPLCTag('Cutter3B', BOOL, M, 23);
			newPLCTag('Cutter3Pos', BOOL, M, 24);
			newPLCTag('OFoilBlocker', BOOL, Y, 4);
			newPLCTag('OFoilClamper', BOOL, Y, 5);
			newPLCTag('OCutter1A', BOOL, Y, 6);
			newPLCTag('OCutter1B', BOOL, Y, 7);
			newPLCTag('OCutter2A', BOOL, Y, 10);
			newPLCTag('OCutter2B', BOOL, Y, 11);
			newPLCTag('OCutter3A', BOOL, Y, 12);
			newPLCTag('OCutter3B', BOOL, Y, 13);
			newPLCTag('OCutter3Pos', BOOL, Y, 14);

			newPLCTag('AutoNextLine', BOOL, M, 10, true);
			newPLCTag('FileEnded', BOOL, M, 11, true);
			newPLCTag('CommandLt', INT, D, 20, true);
			newPLCTag('CommandNb', INT, D, 21, true);
			newPLCTag('ArrayIndex', DINT, D, 22, true);
			newPLCTag('ArrayIndexLimit', DINT, D, 24, true);
			newPLCTag('ArrayIndexMax', DINT, D, 26, true);
			newPLCTag('ArrayLength', DINT, D, 28, true);
			newPLCTag('CommandLtArray', ARRAY(INT, 100), D, 100);
			newPLCTag('CommandNbArray', ARRAY(INT, 100), D, 200);
			newPLCTag('TargetArrayX', ARRAY(DINT, 100), D, 300);
			newPLCTag('TargetArrayY', ARRAY(DINT, 100), D, 500);
			newPLCTag('FeedSpeedArrayX', ARRAY(DINT, 100), D, 700);
			newPLCTag('FeedSpeedArrayY', ARRAY(DINT, 100), D, 900);

			generatePLCTagsAxis(XAxis);
			generatePLCTagsAxis(YAxis);
		}

		function newPLCTag(name, type, deviceName, deviceIndex, syncHMI) {
			deviceName = deviceName == undefined ? '' : deviceName;
			deviceIndex = deviceIndex == undefined ? '' : deviceIndex;
			if (PLCTags.hasOwnProperty(name)) { errorString += `PLCTags already has ${name}\n`; }
			PLCTags[name] = { name: name, type: type, deviceName: deviceName, deviceIndex: deviceIndex }
			PLCTagsString += `"VAR_GLOBAL"	"${name}"	"${type}"	""	"${deviceName}${deviceIndex}"	""	""	""	""	""	""\n`;

			if (syncHMI == true) {
				newHMITag(`-${name}`, PLC1, deviceName, deviceIndex);
			}
		}

		function ARRAY(type, length) {
			return `ARRAY [0..${length - 1}] OF ${type}`;
		}

		function generatePLCTagsAxis(name) {
			let lb = function (n) { return `${name}${n}`; }
			let xy = function (x, y) { return name == XAxis ? x : y; }
			newPLCTag(lb('Dir'), BOOL);
			newPLCTag(lb('DirInt'), DINT);
			newPLCTag(lb('DirInstruction'), BOOL);
			newPLCTag(lb('LimitR'), BOOL);
			newPLCTag(lb('CurPos'), DINT, D, xy(2, 6), true);
			newPLCTag(lb('CurPosP'), DINT, D, xy(8140, 8142));
			newPLCTag(lb('TarPos'), DINT, D, xy(4, 8), true);
			newPLCTag(lb('CurFS'), DINT, D, xy(18, 20), true);
			newPLCTag(lb('TarR'), BOOL);
			newPLCTag(lb('ManualN'), BOOL, M, xy(8, 7), true);
			newPLCTag(lb('ManualP'), BOOL, M, xy(9, 6), true);
			newPLCTag(lb('Manual'), BOOL);
			newPLCTag(lb('ILimitN'), BOOL, X, xy(10, 30));
			newPLCTag(lb('ILimitP'), BOOL, X, xy(11, 31));
			newPLCTag(lb('OOnOff'), BOOL, Y, xy(24, 26));
			newPLCTag(lb('OReset'), BOOL, Y, xy(25, 27));
			newPLCTag(lb('OPulse'), BOOL, Y, xy(0, 1));
			newPLCTag(lb('ODirection'), BOOL, Y, xy(2, 3));
			newPLCTag(lb('RunLatch'), BOOL);
			newPLCTag(lb('RunLatchFalling'), BOOL);
		}

		function generateHMITags() {
			newHMITag('FileIndexChanged', Self, LB, 0);
			newHMITag('PageIndexChanged', Self, LB, 1);
			newHMITag('ArrayIndexChanged', Self, LB, 2);
			newHMITag('ArrayIndexMaxChanged', Self, LB, 3);
			newHMITag('FileIndex', Self, LW, 0);
			newHMITag('PageIndex', Self, LW, 2);
			newHMITag('PageIndexMax', Self, LW, 4);
			newHMITag('ArrayIndex', Self, LW, 6);
			newHMITag('ArrayIndexMax', Self, LW, 8);
			newHMITag('ArrayLength', Self, LW, 10);
			newHMITag('ArrayIndexLimit', Self, LW, 12);
			newHMITag('ArrayStart', Self, LW, 14);
			newHMITag('LineIndicatorState', Self, LW, 16);
			newHMITag('LineIndicatorY', Self, LW, 17);
		}

		function newHMITag(name, plcName, deviceName, deviceIndex) {
			if (HMITags.hasOwnProperty(name)) { errorString += `HMITags already has ${name}\n`; }
			HMITags[name] = { name: name, plcName: plcName, deviceName: deviceName, deviceIndex: deviceIndex }
			HMITagsString += `${name},${plcName},${deviceName},${deviceIndex}\n`;
		}

		generate();

		function copy(text) {
			const temp = document.createElement('textarea');
			temp.value = text;
			document.body.appendChild(temp);
			temp.select();
			document.execCommand('copy');
			document.body.removeChild(temp);
		}
	</script>

</body>

</html>
